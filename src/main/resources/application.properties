spring.application.name=dge-api-paef-v1
server.servlet.context-path=/api
server.port=8880
api.version=1.0

# BD principal (db_paef)
spring.datasource.url=jdbc:postgresql://localhost:5432/db_paef_igrp?currentSchema=paef
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

### FLYWAY CONFIGURATIONS
spring.flyway.enabled=false
spring.flyway.schemas=public
spring.flyway.locations=classpath:db/migration

### OTHERS CONFIGURATIONS
spring.jackson.property-naming-strategy=SNAKE_CASE
link.page.igrp=http://localhost:9080/paef/app/webapps?r=paef/$page$/index&dad=paef&target=_blank&isPublic=1&lang=pt_PT
link.page.document_viewer=https://app-paef.gov.cv/paef/app/webapps?r=igrp/File/get-file&dad=paef&target=_blank&uuid=

